<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acciones G75 - Orgullo 2026</title>
    <!-- Importación de fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <!-- Carga de Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background: #000;
            color: #fff;
            scroll-behavior: smooth;
        }

        .bg-gradient {
            background: linear-gradient(90deg, 
                rgba(255,0,0,0.25) 0%, 
                rgba(255,165,0,0.25) 16%, 
                rgba(255,255,0,0.25) 32%, 
                rgba(0,128,0,0.25) 48%, 
                rgba(0,0,255,0.25) 64%, 
                rgba(75,0,130,0.25) 80%, 
                rgba(238,130,238,0.25) 100%), #000;
            background-attachment: fixed;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.85);
            text-align: center;
            z-index: 100;            height: 100px;

        }
        .logo { 
    height: 100%;       /* Ocupa todo el alto del header */
    width: auto;        /* El ancho se ajusta proporcionalmente */
    object-fit: contain; /* Asegura que la imagen completa sea visible sin deformarse */
    display: block;     /* Elimina espacios en blanco no deseados debajo */
    margin: 0 auto;     /* Centra la imagen horizontalmente */
}
        .section {
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .section-compact {
            min-height: auto;
            padding-top: 0;
            padding-bottom: 25px;
        }

        .step-title {
            font-weight: 700;
            margin-bottom: 20px;
            text-wrap: balance;
            max-width: 90%; 
        }

        .form-frame {
            width: 90%;
            height: 65vh;
            border: none;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .floating-arrow {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: #FFD500;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 99;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255, 213, 0, 0.5);
animation: bounce 2s ease-in-out infinite;        }
        
        /* Ajuste para el tamaño del icono */
        .floating-arrow i { font-size: 25px; }

        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);} 
            40% {transform: translateX(-50%) translateY(-10px);} 
            60% {transform: translateX(-50%) translateY(-5px);} 
        }
    </style>
</head>
<body class="bg-gradient">

    <header>
        <img src="https://raw.githubusercontent.com/demberjavier/imagenes/main/logo%20existir%20con%20los%20mismos%20derechos.svg" alt="Logo" class="logo">
    </header>

    <!-- Icono de Phosphor implementado -->
    <div class="floating-arrow">
        <i class="ph ph-arrow-down"></i>
    </div>

    <section class="section">
        <h2 class="step-title">Paso 1: Firma la petición</h2>
        <iframe src="https://amnistia.org.pe/anuncio/orgullo-2026-Arequipa-g75" class="form-frame"></iframe>
    </section>

    <section class="section section-compact">
        <h2 class="step-title">Paso 2: Síguenos en Instagram</h2>
        <div style="width: 90%; max-width: 400px;">
            <script src="https://elfsightcdn.com/platform.js" async></script>
            <div class="elfsight-app-2100a436-2ddb-42cc-8756-81c2fd993523"></div>
        </div>
    </section>

</body>
</html>
